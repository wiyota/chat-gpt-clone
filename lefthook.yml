pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks git --staged . --verbose --redact
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: pnpm exec oxlint {staged_files}
    format-check:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: pnpm exec oxfmt --check {staged_files}

pre-push:
  commands:
    ci-check:
      run: pnpm ci:check
